scene_good_morning:
  alias: "Scene: Good Morning"
  icon: mdi:white-balance-sunny
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.morning_mode

scene_good_night:
  alias: "Scene: Good Night"
  icon: mdi:weather-night
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.night_mode

scene_away_mode:
  alias: "Scene: Away Mode"
  icon: mdi:home-export-outline
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.chill_mode

scene_welcome_home:
  alias: "Scene: Welcome Home"
  icon: mdi:home-import-outline
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.day_mode

scene_movie_time:
  alias: "Scene: Movie Time"
  icon: mdi:movie-open-outline
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.chill_mode

scene_dinner_time:
  alias: "Scene: Dinner Time"
  icon: mdi:food-fork-drink
  sequence:
    - service: scene.turn_on
      target:
        entity_id: scene.dinner_time

scene_secure:
  alias: Secure
  description: >-
    Lock all doors and close all garages. Fire-and-forget; ratgdo's
    safety sensors prevent garage closure if an obstacle is detected.
  sequence:
    - parallel:
        - service: lock.lock
          target:
            entity_id:
              - lock.front_door_lock
              - lock.back_door_lock
              - lock.gemelli_door_lock
        - service: cover.close_cover
          target:
            entity_id:
              - cover.ratgdov25i_1746c3_door
              - cover.ratgdov25i_1746b4_door
  mode: single
