services:
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2025.12.7
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Chicago
      - ESPHOME_DASHBOARD_USE_PING=true
