homeassistant:
  customize:
    camera.doorbell:
      friendly_name: "Front Door"
    camera.nest_cam_1:
      friendly_name: "Living Room"
    camera.nest_cam_2:
      friendly_name: "Ben's Room"
    camera.nanit_benjamin:
      friendly_name: "Ben's Bed"
    camera.nanit_travel:
      friendly_name: "Dining Room"

# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /local/mobile_v1/kis-nav.js?v=53
    - /local/mobile_v2/kis-app-shell.js?v=59

lovelace:
  dashboards:
    mobile-v2:
      mode: yaml
      filename: www/mobile_v2/kis-dashboard-v2.yaml
      title: mobilev2
      icon: mdi:home
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Day/night theme mode — read by kis-nav.js and by the theme_mode_sync
# automation (see automations.yaml). Auto = follow sun.sun.
input_select:
  theme_mode:
    name: Theme Mode
    options:
      - Auto
      - Day
      - Night
    initial: Auto
    icon: mdi:theme-light-dark

# Tracks the currently visible slide index of the priority-display zone's
# simple-swipe-card on mobilev1. kis-nav.js pushes this value via
# input_number.set_value whenever the active-slide class lands on a new
# slide element. The Lovelace section_label template above the carousel
# reads this number to show "VEHICLES" (0) or "WEATHER" (1).
input_number:
  priority_slide_index:
    name: Priority Slide Index
    min: 0
    max: 4
    step: 1
    initial: 0
    icon: mdi:view-carousel

# Camera Follow Code — stores which camera currently holds the priority lock.
# Values: 'none', 'doorbell', 'living_room', 'bens_room', 'nanit_benjamin', 'nanit_travel'.
input_boolean:
  kiosk_mode:
    name: Kiosk Mode
    initial: true
    icon: mdi:fullscreen

input_text:
  priority_camera_lock:
    name: "Camera Follow Code — Active Lock"
    initial: "none"
    max: 20
  kis_day_primary_accent:
    name: "KIS Day Primary Accent"
    initial: "#0088a8"
    max: 30
  kis_day_bg_app:
    name: "KIS Day Background"
    initial: "#f0f2f5"
    max: 30
  kis_day_text_primary:
    name: "KIS Day Primary Text"
    initial: "#1a2030"
    max: 30
  kis_day_text_secondary:
    name: "KIS Day Secondary Text"
    initial: "#4a5a72"
    max: 30
  kis_day_success:
    name: "KIS Day Success (Locked/Closed)"
    initial: "#089464"
    max: 30
  kis_day_warning:
    name: "KIS Day Warning (Unlocked)"
    initial: "#c07808"
    max: 30
  kis_day_error:
    name: "KIS Day Error (Open/Alert)"
    initial: "#c02840"
    max: 30
  kis_day_info:
    name: "KIS Day Info (Blue)"
    initial: "#2d6bc4"
    max: 30
  kis_day_scene_active:
    name: "KIS Day Scene Active"
    initial: "#c07808"
    max: 30
  kis_day_section_label:
    name: "KIS Day Section Label"
    initial: "#7a8698"
    max: 30
  kis_night_primary_accent:
    name: "KIS Night Primary Accent"
    initial: "#00d4f0"
    max: 30
  kis_night_bg_app:
    name: "KIS Night Background"
    initial: "#070910"
    max: 30
  kis_night_text_primary:
    name: "KIS Night Primary Text"
    initial: "#eef2f8"
    max: 30
  kis_night_text_secondary:
    name: "KIS Night Secondary Text"
    initial: "#8a9ab8"
    max: 30
  kis_night_success:
    name: "KIS Night Success (Locked/Closed)"
    initial: "#10d090"
    max: 30
  kis_night_warning:
    name: "KIS Night Warning (Unlocked)"
    initial: "#f5a623"
    max: 30
  kis_night_error:
    name: "KIS Night Error (Open/Alert)"
    initial: "#f04060"
    max: 30
  kis_night_info:
    name: "KIS Night Info (Blue)"
    initial: "#4d8ef0"
    max: 30
  kis_night_scene_active:
    name: "KIS Night Scene Active"
    initial: "#f5a623"
    max: 30
  kis_night_section_label:
    name: "KIS Night Section Label"
    initial: "#4a5570"
    max: 30

# Camera Follow Code — 60-second trailing window before releasing camera lock.
timer:
  priority_camera_release:
    name: "Camera Follow Code — Release Timer"
    duration: "00:01:00"
    restore: true

template:
  - sensor:
      - name: "Chris Distance from Home"
        unique_id: chris_distance_from_home
        state: >
          {% if is_state('person.chris', 'home') %}
            Home
          {% else %}
            {{ (distance('person.chris', 'zone.home') * 0.621371) | round(1) }} mi away
          {% endif %}

      - name: "Claire Distance from Home"
        unique_id: claire_distance_from_home
        state: >
          {% if is_state('person.claire', 'home') %}
            Home
          {% else %}
            {{ (distance('person.claire', 'zone.home') * 0.621371) | round(1) }} mi away
          {% endif %}

      # Camera Follow Code — driven by input_text.priority_camera_lock
      # (see automations in automations.yaml, search "Camera Follow Code").
      # Lock values are physical-room keys, passed through directly.
      - name: "Priority Camera"
        unique_id: priority_camera
        state: "{{ states('input_text.priority_camera_lock') }}"

# ─── RECORDER ────────────────────────────────────────────────────────────────
# Controls what gets written to your database (home-assistant_v2.db)
# Goal: keep history meaningful, exclude noisy/useless entities

recorder:
  purge_keep_days: 30          # Keep 30 days of history, auto-purge older data
  commit_interval: 5           # Write to DB every 5s instead of every state change
                               # Reduces disk writes significantly on SD cards / SSDs

  exclude:
    # ── Domains to fully exclude ──────────────────────────────────────────────
    domains:
      - automation              # No need to log automation state changes
      - updater                 # Update notifications don't need history
      - sun                     # Sun position changes constantly, not useful
      - weather                 # High frequency, large data, not useful in history

    # ── Entity patterns to exclude ────────────────────────────────────────────
    entity_globs:
      - sensor.*_distance_from_home     # Distance sensors update too frequently
      - sensor.*_signal_strength        # WiFi/Zigbee signal noise
      - sensor.*_linkquality            # Zigbee link quality noise
      - sensor.*_lqi                    # Same
      - sensor.*_rssi                   # Radio signal noise
      - sensor.time*                    # Time sensors change every minute
      - sensor.date*                    # Date sensors
      - sensor.*uptime*                 # Uptime counters
      - sensor.*_last_seen              # Last seen timestamps

    # ── Specific entities to exclude ─────────────────────────────────────────
    entities:
      # Fully Kiosk - updates constantly, not useful in history
      - sensor.galaxy_tab_s9_battery_level
      - sensor.galaxy_tab_s9_screen_brightness

      # Add any other noisy entities here as you discover them


  # ── Entities to ALWAYS include even if domain is excluded ────────────────
  include:
    entities:
      - automation.garage_light_off_after_5_min_no_motion   # keep automation run history
      - light.garage_light                                   # keep light history


# ─── LOGGER ──────────────────────────────────────────────────────────────────
# Controls what gets written to home-assistant.log
# Goal: catch real errors, silence known noisy components

logger:
  default: warning              # Only log warnings and errors by default

  logs:
    # ── Silence known noisy components ───────────────────────────────────────
    custom_components.frigate: warning           # Frigate integration logging
    homeassistant.components.sonos: error       # Already broken speaker - silence warnings
    homeassistant.components.recorder: error    # Suppress routine recorder messages
    homeassistant.components.websocket_api: error
    homeassistant.loader: error                 # Integration loader noise
    aiohttp.access: error                       # HTTP access log noise

    # ── Keep important components at info for visibility ──────────────────────
    homeassistant.core: warning
    homeassistant.components.automation: info   # See when automations fire
    homeassistant.components.script: info       # See when scripts run

    # ── Uncomment below temporarily when debugging a specific component ───────
    # homeassistant.components.zwave_js: debug
    # homeassistant.components.mqtt: debug
    # custom_components.ratgdo: debug


# ─── HISTORY ─────────────────────────────────────────────────────────────────
# Controls what appears in the History panel in the UI
# Mirrors recorder exclusions for a clean history view
history: ~


# ─── LOGBOOK ─────────────────────────────────────────────────────────────────
# Controls what appears in the Logbook panel
# Keep this clean so real events stand out

logbook:
  exclude:
    domains:
      - automation
      - sun
      - weather
    entity_globs:
      - sensor.*_distance_from_home
      - sensor.*_signal_strength
      - sensor.*_linkquality
      - sensor.*_rssi
      - sensor.time*
      - sensor.date*
      - sensor.*uptime*
      - sensor.*_lqi        # add this line
      - sensor.*_last_seen  # add this line too
      
browser_mod:

# ─── CAMERAS ─────────────────────────────────────────────────────────────────
# All 5 cameras (doorbell, nest_cam_1, nest_cam_2, nanit_benjamin,
# nanit_travel) are now served by Frigate's embedded go2rtc.
# The Frigate integration creates camera.* entities automatically.
# No manual camera: platform entries needed.