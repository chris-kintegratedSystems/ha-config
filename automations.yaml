- id: '1773717709713'
  alias: Ben's Light - Off After 5 Min No Motion
  description: Turns off Ben's light if no motion detected for 5 minutes
  triggers:
  - trigger: state
    entity_id: binary_sensor.living_room_camera_motion
    to: 'off'
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: light.bens_light
    state: 'on'
  actions:
  - action: light.turn_off
    target:
      entity_id: light.bens_light
  mode: single
- id: theme_mode_sync
  alias: Theme Mode - Sync HA Frontend Theme
  description: >-
    Keeps HA's native theme in sync with input_select.theme_mode. Auto follows
    sun.sun (kis-day above horizon, kis-dark below). Day/Night force the
    respective theme. kis-nav.js applies its own data-kis-day attribute from
    the same source on every tick.
  triggers:
  - trigger: state
    entity_id: input_select.theme_mode
  - trigger: state
    entity_id: sun.sun
    to: below_horizon
  - trigger: state
    entity_id: sun.sun
    to: above_horizon
  - trigger: homeassistant
    event: start
  actions:
  - variables:
      mode: "{{ states('input_select.theme_mode') }}"
      sun_below: "{{ is_state('sun.sun', 'below_horizon') }}"
      target_theme: >-
        {% if mode == 'Day' %}kis-day
        {% elif mode == 'Night' %}kis-dark
        {% elif sun_below %}kis-dark
        {% else %}kis-day
        {% endif %}
  - action: frontend.set_theme
    data:
      name: "{{ target_theme | trim }}"
  mode: single
  max_exceeded: silent
- id: priority_camera_reset_on_start
  alias: Priority Camera - Reset on HA Start
  description: >-
    Clear any stale active_priority_camera value and cancel any running
    linger timer when HA boots, so the carousel shows until real motion
    fires. Needed because input_text values survive restarts but sticky
    sensors do not, so a stale "doorbell" value can outlive the motion
    that caused it.
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - action: input_text.set_value
    target:
      entity_id: input_text.active_priority_camera
    data:
      value: none
  - action: timer.cancel
    target:
      entity_id: timer.priority_camera_linger
  mode: single
- id: priority_camera_sticky_on
  alias: Priority Camera - Sticky ON Handler
  description: >-
    Priority-tiered takeover with freshness-based same-tier arbitration.
    When a motion sticky turns ON, decide if the new camera should take
    over the priority zone.

      Tier 1 (URGENT): doorbell — security, always interrupts.
      Tier 2 (NORMAL): living_room, izzy — interior cameras, arbitrated
                       by freshness instead of strict hold-until-clear
                       so a fresh room event can displace a room with
                       ongoing stale motion (kids playing continuously
                       must not block a new event elsewhere).

    FRESH = incoming sticky's last OFF was >= 60 s ago (quiet room).
    STALE = currently-active camera's sticky has been ON for >= 60 s
            (ongoing activity).

    Takeover rules:
      * No current owner -> take over.
      * Incoming is HIGHER tier than current (doorbell vs interior) ->
        OVERRIDE immediately regardless of freshness.
      * Incoming is LOWER tier than current -> hold (never demote).
      * Same tier, current's sticky already cleared -> take over.
      * Same tier, both sticky-on:
          - incoming fresh, current stale  -> switch (fresh beats stale)
          - both fresh                     -> switch (most-recent wins)
          - incoming stale, current fresh  -> hold current
          - both stale                     -> hold current (no ping-pong
            between two busy rooms)

    Any takeover cancels a pending linger timer so the zone does not
    return to the carousel behind us.
  mode: queued
  max: 10
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.doorbell_motion_sticky
    - binary_sensor.living_room_camera_motion_sticky
    - binary_sensor.izzy_camera_motion_sticky
    from: 'off'
    to: 'on'
  actions:
  - variables:
      cam_map:
        binary_sensor.doorbell_motion_sticky: doorbell
        binary_sensor.living_room_camera_motion_sticky: living_room
        binary_sensor.izzy_camera_motion_sticky: izzy
      sticky_map:
        doorbell: binary_sensor.doorbell_motion_sticky
        living_room: binary_sensor.living_room_camera_motion_sticky
        izzy: binary_sensor.izzy_camera_motion_sticky
      clear_map:
        living_room: input_datetime.last_motion_clear_living_room
        izzy: input_datetime.last_motion_clear_izzy
      tier_map:
        doorbell: 1
        living_room: 2
        izzy: 2
      new_cam: "{{ cam_map[trigger.entity_id] }}"
      new_tier: "{{ tier_map[cam_map[trigger.entity_id]] }}"
      current: "{{ states('input_text.active_priority_camera') }}"
      current_tier: >-
        {% if current in tier_map %}
          {{ tier_map[current] }}
        {% else %}
          99
        {% endif %}
      current_sticky_state: >-
        {% if current in sticky_map %}
          {{ states(sticky_map[current]) }}
        {% else %}
          off
        {% endif %}
      now_ts: "{{ as_timestamp(now()) }}"
      incoming_last_clear_ts: >-
        {% if new_cam in clear_map %}
          {{ state_attr(clear_map[new_cam], 'timestamp') | float(0) }}
        {% else %}
          0
        {% endif %}
      incoming_is_fresh: >-
        {{ (now_ts | float) - (incoming_last_clear_ts | float) >= 60 }}
      should_take_over: >-
        {% if current not in ['doorbell', 'living_room', 'izzy'] %}
          true
        {% elif (new_tier | int) < (current_tier | int) %}
          true
        {% elif (new_tier | int) > (current_tier | int) %}
          false
        {% elif current_sticky_state != 'on' %}
          true
        {% elif incoming_is_fresh | trim == 'True' %}
          true
        {% else %}
          false
        {% endif %}
  - choose:
    - conditions:
      - "{{ should_take_over | trim == 'true' }}"
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.active_priority_camera
        data:
          value: "{{ new_cam }}"
      - action: timer.cancel
        target:
          entity_id: timer.priority_camera_linger
- id: priority_camera_sticky_off
  alias: Priority Camera - Sticky OFF Handler
  description: >-
    A motion sticky just cleared. Two responsibilities:

      A. Record the clear timestamp for interior cameras so the
         sticky_on freshness check sees the correct quiet-period gap
         the next time this camera fires. (Doorbell is Tier 1 override
         and does not participate in freshness, so no timestamp.)
      B. If the cleared camera is the currently-active priority owner,
         pick a replacement:
           1. Any still-active Tier 1 (doorbell) camera wins first —
              security trumps interior even on handoff.
           2. Otherwise pick the still-active Tier 2 camera that is
              FRESHEST (most-recent last_changed = turned on most
              recently). Matches the user's "fresh event beats ongoing"
              preference and is the inverse of the old "oldest wins"
              rule that biased toward whichever room had been active
              longest (staleness).
           3. Nothing else active -> start the 30-second linger timer
              so the last feed stays on screen before the carousel
              returns.

    Step B is skipped when the OFF event is for a non-current camera
    (current owner's feed keeps showing; its own sticky just happened
    to tick past a pulse gap unrelated to the zone). Step A still runs.
  mode: queued
  max: 10
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.doorbell_motion_sticky
    - binary_sensor.living_room_camera_motion_sticky
    - binary_sensor.izzy_camera_motion_sticky
    from: 'on'
    to: 'off'
  actions:
  - variables:
      cam_map:
        binary_sensor.doorbell_motion_sticky: doorbell
        binary_sensor.living_room_camera_motion_sticky: living_room
        binary_sensor.izzy_camera_motion_sticky: izzy
      clear_map:
        living_room: input_datetime.last_motion_clear_living_room
        izzy: input_datetime.last_motion_clear_izzy
      tier_map:
        doorbell: 1
        living_room: 2
        izzy: 2
      cleared_cam: "{{ cam_map[trigger.entity_id] }}"
      current: "{{ states('input_text.active_priority_camera') }}"
  # Step A: record the clear timestamp for interior cameras. Runs for
  # every OFF event regardless of whether this camera is the current
  # priority owner.
  - choose:
    - conditions:
      - "{{ cleared_cam in ['living_room', 'izzy'] }}"
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ clear_map[cleared_cam] }}"
        data:
          timestamp: "{{ as_timestamp(now()) }}"
  # Step B: only proceed with replacement selection if the cleared
  # camera is the currently active priority owner.
  - condition: template
    value_template: "{{ cleared_cam == current }}"
  - variables:
      next_cam: >-
        {% set entities = [
          'binary_sensor.doorbell_motion_sticky',
          'binary_sensor.living_room_camera_motion_sticky',
          'binary_sensor.izzy_camera_motion_sticky'
        ] %}
        {% set ns = namespace(t1=[], t2=[]) %}
        {% for e in entities %}
          {% if e != trigger.entity_id and is_state(e, 'on') %}
            {% set cam = cam_map[e] %}
            {% set ts = as_timestamp(states[e].last_changed) %}
            {% if tier_map[cam] == 1 %}
              {% set ns.t1 = ns.t1 + [(cam, ts)] %}
            {% else %}
              {% set ns.t2 = ns.t2 + [(cam, ts)] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {# Tier 1 wins first; Tier 2 fallback picks FRESHEST (newest
           last_changed = sticky turned on most recently). #}
        {% set t1_sorted = ns.t1 | sort(attribute=1, reverse=True) %}
        {% set t2_sorted = ns.t2 | sort(attribute=1, reverse=True) %}
        {% if t1_sorted | length > 0 %}
          {{ t1_sorted[0][0] }}
        {% elif t2_sorted | length > 0 %}
          {{ t2_sorted[0][0] }}
        {% else %}
          none
        {% endif %}
  - choose:
    - conditions:
      - "{{ next_cam | trim in ['doorbell', 'living_room', 'izzy'] }}"
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.active_priority_camera
        data:
          value: "{{ next_cam | trim }}"
      - action: timer.cancel
        target:
          entity_id: timer.priority_camera_linger
    default:
    - action: timer.start
      target:
        entity_id: timer.priority_camera_linger
      data:
        duration: "00:00:30"
- id: priority_camera_linger_finished
  alias: Priority Camera - Linger Timer Finished
  description: >-
    The 30-second linger expired with no new motion. Return the
    priority zone to "none" so the dashboard carousel takes back over.
    If motion had fired during the linger, sticky_on would have
    canceled this timer and it would never have reached timer.finished.
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.priority_camera_linger
  actions:
  - action: input_text.set_value
    target:
      entity_id: input_text.active_priority_camera
    data:
      value: none
  mode: single
