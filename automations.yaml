          sound_mode: Ocean
      - action: media_player.media_play
        target:
          entity_id: media_player.benjamins_hatch_media_player
    - conditions:
      - condition: trigger
        id: morning
      sequence:
      - action: media_player.media_pause
        target:
          entity_id: media_player.benjamins_hatch_media_player
  mode: single
- id: '1773261554369'
  alias: Living Area Lighting Automation
  description: Activate Different Scenes by Time of Day
  triggers:
  - trigger: sun
    event: sunrise
    offset: -03:00:00
    id: morning
  - trigger: sun
    event: sunrise
    offset: 00:00:00
    id: day
  - trigger: sun
    event: sunset
    offset: 01:00:00
    id: evening
  - trigger: time
    at: '22:00:00'
    id: night
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: morning
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.morning_mode
        data:
          transition: 2
    - conditions:
      - condition: trigger
        id: day
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.day_mode
        data:
          transition: 2
    - conditions:
      - condition: trigger
        id: evening
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.chill_mode
        data:
          transition: 2
    - conditions:
