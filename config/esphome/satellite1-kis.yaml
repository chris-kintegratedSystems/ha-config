# KIS Satellite1 v16 — FPH hardware + ARIA Bridge + Speaker
# Wake word: "Hey Jarvis" → ARIA Bridge → Grok Realtime → TTS playback
#
# v5 → v6: Added TAS2780 speaker amp, I2S speaker output, resampler.
# Bridge audio (16kHz/16bit/mono) is resampled to 48kHz for I2S bus.
# v9: wifi power_save_mode=none — fixes idle ping latency floor (34ms→2ms).
# v10: removed v9 temp diagnostics; wifi fast_connect + post_connect_roaming=false (mesh lock, idle ping 74->12ms).
# v11-13: send-path instrumentation, mic-drop counters, ws_send capped to 2048B (smooth, 0 drops), half-duplex turn-taking.
# v14: TTS played at 48kHz — partial; v15: 48kHz STEREO (bridge sends stereo, set_audio_stream_info=16/2/48000) — I2S bus is stereo, mono played 2x fast. Chipmunk FIXED (Chris confirmed).
# v16: ws_recv_frame_ rewritten with atomic recv_exact_ reads — fixes the frame DESYNC that
#      mis-read stereo TTS as text frames -> read error -> TTS clipped at ~4s.
# v16-clean: autotest stripped (acoustic harness uses the real wake-word path). recv fix + wifi-lock unchanged.
#
# Architecture: FPH packages handle XMOS co-processor, I2S bus, and audio
# hardware. aria_bridge replaces voice_assistant for Grok integration.
#
# Hardware: FPH Satellite1 v0.1.5 — XMOS XU316 is I2S master.
# ESP32-S3 runs in I2S secondary (slave) mode on a shared duplex bus.

substitutions:
  xmos_fw_version: v1.0.3

esphome:
  name: satellite1-kis
  friendly_name: "TARS Satellite Office"
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB
  on_boot:
    priority: -100
    then:
      - logger.log: "KIS Satellite booting — waiting for XMOS + WiFi..."
      - delay: 5s
      - logger.log: "Starting wake word detection..."
      - micro_wake_word.start:
      - logger.log: "Listening for Hey Jarvis"
      - lambda: 'id(dac_proxy)->set_volume(1.0);'   # v18: boost speaker volume (restored pref was 0.55, too quiet)
      - logger.log: "Speaker DAC volume set to 1.0"

# --- FPH Hardware Packages ---
# core_board: ESP32-S3 config, PSRAM, I2C, SPI, UART, I2S (duplex + secondary)
# components.external: FPH custom components (satellite1, i2s_audio, tas2780, etc.)
packages:
  hardware:
    url: &repo https://github.com/futureproofhomes/satellite1-esphome
    ref: &ref staging
    refresh: 1s
    files:
      - config/common/core_board.yaml
      - path: config/common/components.external.yaml
        vars:
          ext_comp_repo_url: https://github.com/futureproofhomes/satellite1-esphome
          ext_comp_repo_ref: staging

# --- KIS Custom Component ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [aria_bridge]

# v23: scrape the MWW detection-probability log line into globals so the on_wake_word_detected
# handler can include the value in its emitted event. Zero MWW source patch — relies on the
# stable ESP_LOGD message format at `micro_wake_word.cpp:325`. If FPH/ESPHome changes that line,
# the scrape silently fails (probability falls back to -1.0). Document at any future bump.
logger:
  level: DEBUG
  on_message:
    - level: DEBUG
      then:
        - lambda: |-
            // tag == "micro_wake_word", message == "Detected '<name>' with sliding average probability is 0.92 and max probability is 0.95"
            if (tag == nullptr || strcmp(tag, "micro_wake_word") != 0) return;
            const char *p = message;
            const char *aidx = strstr(p, "average probability is ");
            const char *midx = strstr(p, "max probability is ");
            if (aidx) id(last_wake_prob_avg) = strtof(aidx + 23, nullptr);
            if (midx) id(last_wake_prob_max) = strtof(midx + 19, nullptr);

api:

ota:
  - platform: esphome
    password: !secret satellite1_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none          # v9: disable WiFi power-save — fixes idle ping floor (34ms->2ms)
  fast_connect: true             # v10: skip scan, lock to one mesh AP (stop roaming churn)
  post_connect_roaming: false    # v10: don't roam between Casadekup mesh BSSIDs (steady-state stall hypothesis)
  on_connect:
    - lambda: |-
        // v23 NOTE: ESPHome ESP-IDF doesn't expose Arduino's WiFi.SSID()/RSSI() here. Could
        // wire the wifi component pointer if rssi/ssid is needed later; MVP just emits the edge.
        id(aria).emit_event("wifi_connected", "{}");
  on_disconnect:
    - lambda: |-
        id(aria).emit_event("wifi_disconnected", "{}");

safe_mode:

# v23: SNTP — Pi (192.168.51.179) runs systemd-timesyncd; pool.ntp.org as fallback. Required so
# satellite-emitted events carry a wall-clock ts that aligns with the bridge's (bridge timestamps
# arrival regardless, but matched satellite ts makes per-step latency math sub-millisecond clean).
time:
  - platform: sntp
    id: ntp_time
    servers:
      - 192.168.51.179
      - pool.ntp.org

# --- TAS2780 Power Tracking ---
globals:
  - id: pd_power_contract
    type: int
    restore_value: no
    initial_value: '0'
  - id: xmos_flash_attempts          # v17: cap XMOS auto-flash retries (loop-safety; 3 then stop)
    type: int
    restore_value: yes
    initial_value: '0'
  - id: last_wake_prob_avg           # v23: MWW probability scrape destinations (see logger.on_message)
    type: float
    restore_value: no
    initial_value: '-1.0f'
  - id: last_wake_prob_max
    type: float
    restore_value: no
    initial_value: '-1.0f'
  - id: last_session_uuid            # v23: 12-hex satellite-generated session_id, stitches WS + prewake + events
    type: std::string
    restore_value: no
    initial_value: '""'

# --- TEST-ONLY (v18): wake-word bypass for autonomous testing ---
# Starts an ARIA session every 90s when idle so the loop can exercise the bridge/speaker
# path without depending on micro_wake_word (which won't fire on played/synthetic audio).
# REMOVE before production.
interval:
  - interval: 86400s          # v23: autotest body kept for emergency revival (uses full wake flow) but disabled
    then:
      - if:
          condition:
            lambda: 'return !id(aria).is_active();'
          then:
            - logger.log: "v23 autotest: simulating full wake flow (only fires when interval is lowered for diagnostics)"
            - lambda: |-
                char uuid[13];
                snprintf(uuid, sizeof(uuid), "%08x%04x",
                         (unsigned) random_uint32(), (unsigned)(random_uint32() & 0xFFFF));
                id(last_session_uuid) = std::string(uuid);
                char payload[160];
                snprintf(payload, sizeof(payload),
                         "{\"wake_word\":\"AUTOTEST\",\"probability\":%.3f,\"max_probability\":%.3f,\"autotest\":true}",
                         id(last_wake_prob_avg), id(last_wake_prob_max));
                id(aria).emit_event("wake_word_detected", std::string(payload));
                id(aria).start_session_with_uuid(id(last_session_uuid));

# --- XMOS Co-Processor Init (SPI handshake + reset) ---
satellite1:
  id: satellite1_id
  spi_id: spi_0
  cs_pin: GPIO10
  data_rate: 8000000
  spi_mode: MODE3
  xmos_rst_pin: GPIO4
  on_xmos_connected:
    # This device fires on_xmos_connected (I2S clocks present) even when the XMOS app
    # firmware version is unreadable — so the flash trigger must live HERE on the
    # version-mismatch path (FPH's pattern), not only on on_xmos_no_response.
    - logger.log: "XMOS connected — I2S clocks active"
    - if:
        condition:
          lambda: 'return id(xflash).has_image_embedded() && !id(xflash).match_embedded(id(satellite1_id).xmos_fw_version);'
        then:
          # version mismatch / unreadable — flash embedded v1.0.3 (max 3 attempts)
          - if:
              condition:
                lambda: 'return id(xmos_flash_attempts) < 3;'
              then:
                - lambda: 'id(xmos_flash_attempts) += 1;'
                - logger.log:
                    format: "XMOS auto-flash (version mismatch): attempt %d/3 — writing embedded v1.0.3"
                    args: ['id(xmos_flash_attempts)']
                - memory_flasher.write_embedded_image:
              else:
                - logger.log:
                    level: ERROR
                    format: "XMOS auto-flash: stopped after %d attempts — manual intervention needed"
                    args: ['id(xmos_flash_attempts)']
        else:
          # version matches embedded image — XMOS is healthy, reset the retry counter
          - logger.log: "XMOS firmware matches embedded v1.0.3 — up to date"
          - globals.set:
              id: xmos_flash_attempts
              value: '0'
  on_xmos_no_response:
    - logger.log:
        level: ERROR
        format: "XMOS not responding — I2S clocks may be absent"
    - if:                            # v17: auto-flash embedded XMOS image (max 3 attempts, then stop)
        condition:
          lambda: 'return id(xmos_flash_attempts) < 3 && id(xflash).has_image_embedded();'
        then:
          - lambda: 'id(xmos_flash_attempts) += 1;'
          - logger.log:
              format: "XMOS auto-flash: attempt %d/3 — writing embedded v1.0.3 image"
              args: ['id(xmos_flash_attempts)']
          - memory_flasher.write_embedded_image:
        else:
          - logger.log:
              level: ERROR
              format: "XMOS auto-flash: stopped (attempts=%d / no embedded image) — manual intervention needed"
              args: ['id(xmos_flash_attempts)']

http_request:                        # v17: required dependency of memory_flasher

# --- v17: XMOS firmware flasher ---
# embed_flash_image copied VERBATIM from FPH satellite1.base.yaml (staging, v1.0.3).
# memory_flasher component is registered via the imported components.external package.
# Callbacks reduced to logging (FPH's LED/factory-reset refs aren't in this minimal config).
# Triggered from satellite1.on_xmos_no_response above (guarded by xmos_flash_attempts < 3).
memory_flasher:
  - platform: satellite1
    id: xflash
    embed_flash_image:
      image_version: ${xmos_fw_version}
      image_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.bin
      md5_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.md5
    on_flashing_start:
      then:
        - logger.log: "XMOS flash: START"
    on_progress_update:
      then:
        - logger.log:
            format: "XMOS flash: progress %d%%"
            args: ['(int) id(xflash).flashing_progress']
    on_flashing_success:
      then:
        - logger.log: "XMOS flash: SUCCESS — XMOS will reboot"
    on_flashing_failed:
      then:
        - logger.log:
            level: ERROR
            format: "XMOS flash: FAILED"

# --- USB-C Power Delivery + TAS2780 Activation ---
fusb302b:
  id: pd_fusb302b
  irq_pin: GPIO1
  request_voltage: 20
  on_power_ready:
    then:
      - lambda: id(pd_power_contract) = id(pd_fusb302b).contract_voltage;
      - logger.log:
          format: "PD contract accepted: %dV — activating TAS2780"
          args: ['id(pd_power_contract)']
      - tas2780.activate:
          mode: !lambda 'return id(pd_power_contract) >= 9 ? 2 : 0;'

# --- Microphone (FPH satellite1 platform) ---
# XMOS delivers 48kHz/32-bit/stereo; Sat1Microphone downsamples to 16kHz mono
microphone:
  - platform: satellite1
    id: sat1_mics
    sample_rate: 48000
    i2s_din_pin: GPIO15
    bits_per_sample: 32bit
    channel: stereo
    pdm: false
    adc_type: external
    i2s_audio_id: i2s_shared

# --- DAC Chain (TAS2780 speaker amp + proxy) ---
audio_dac:
  - platform: tas2780
    id: speaker_dac
    address: 0x3F
  - platform: satellite1
    id: dac_proxy
    speaker_dac: speaker_dac

# --- Speaker Output (I2S → resampler for bridge audio) ---
speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_dout_pin: GPIO9
    bits_per_sample: 32bit
    i2s_audio_id: i2s_shared
    dac_type: external
    channel: stereo
    timeout: never
    audio_dac: dac_proxy
  - platform: resampler
    id: sat1_speaker
    output_speaker: i2s_audio_speaker
    sample_rate: 48000
    bits_per_sample: 16

# --- Wake Word Detection ---
micro_wake_word:
  models:
    - model: hey_jarvis
      probability_cutoff: 0.7   # v19 experiment: 0.97 rejects played audio; lower to let laptop-speaker prompts fire (tune up after)
  vad:
  microphone:
    microphone: sat1_mics
    channels: 1
    gain_factor: 6
  stop_after_detection: false
  on_wake_word_detected:
    - logger.log: "Wake word detected — starting ARIA session"
    # v23: generate session_uuid + emit wake_word_detected with scraped probability + start
    # the session with that uuid (which triggers pre-wake ring snapshot + upload).
    - lambda: |-
        // 12-hex satellite-generated UUID (32-bit hex × 2 = 12 chars). random_uint32() seeded by ESPHome.
        char uuid[13];
        snprintf(uuid, sizeof(uuid), "%08x%04x",
                 (unsigned) random_uint32(), (unsigned)(random_uint32() & 0xFFFF));
        id(last_session_uuid) = std::string(uuid);
        char payload[160];
        snprintf(payload, sizeof(payload),
                 "{\"wake_word\":\"%s\",\"probability\":%.3f,\"max_probability\":%.3f}",
                 wake_word.c_str(),
                 id(last_wake_prob_avg), id(last_wake_prob_max));
        id(aria).emit_event("wake_word_detected", std::string(payload));
        // start_session_with_uuid snapshots the prewake ring, fires the upload task, then
        // kicks off the WS connect (which carries ?session_id=<uuid> so bridge stitches).
        id(aria).start_session_with_uuid(id(last_session_uuid));
        // reset the probability globals so a missed-scrape on the next fire shows as -1
        id(last_wake_prob_avg) = -1.0f;
        id(last_wake_prob_max) = -1.0f;

# --- ARIA Bridge (mic + speaker via resampler) ---
# v21: phase triggers drive the LED state machine. Blue family for normal phases (LISTENING →
# THINKING → RESPONDING), red for actual errors. Returns to IDLE (off) on every session end.
aria_bridge:
  id: aria
  bridge_url: "ws://192.168.51.179:8766/satellite"
  microphone_id: sat1_mics
  speaker_id: sat1_speaker
  sample_rate: 16000
  # v23: unified event log + pre-wake audio audit substrate
  event_post_url: "http://192.168.51.179:8766/satellite-event"
  prewake_post_url: "http://192.168.51.179:8766/satellite-prewake-audio"
  prewake_seconds: 2
  satellite_id: "satellite1-kis"
  on_listening_start:
    - light.turn_on:
        id: led_ring
        red: 25%
        green: 50%
        blue: 100%             # ~#4080FF — mid blue, slow breathing
        brightness: 50%
        effect: "Listening Blue Pulse"
  on_thinking_start:
    - light.turn_on:
        id: led_ring
        red: 12%
        green: 38%
        blue: 100%             # ~#2060FF — brighter blue, medium chase
        brightness: 70%
        effect: "Thinking Blue Chase"
  on_responding_start:
    - light.turn_on:
        id: led_ring
        red: 0%
        green: 25%
        blue: 100%             # ~#0040FF — brightest blue, faster chase
        brightness: 90%
        effect: "Responding Blue Chase"
  on_error:
    - light.turn_on:
        id: led_ring
        red: 100%
        green: 0%
        blue: 0%
        brightness: 80%
        effect: "Error Red Pulse"
  on_idle:
    - light.turn_off:
        id: led_ring

# --- LED Ring (24x WS2812, GPIO21) ---
light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    pin: GPIO21
    num_leds: 24
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 100ms
    effects:
      # v21: phase effects — colors set per-call from aria_bridge triggers above, so these are
      # color-agnostic motion/timing profiles. Blue for normal states; red used only via Error.
      - pulse:
          name: "Listening Blue Pulse"
          transition_length: 1500ms
          update_interval: 1500ms
          min_brightness: 15%
          max_brightness: 60%
      - addressable_scan:
          name: "Thinking Blue Chase"
          move_interval: 80ms
          scan_width: 4
      - addressable_scan:
          name: "Responding Blue Chase"
          move_interval: 40ms
          scan_width: 6
      - pulse:
          name: "Error Red Pulse"
          transition_length: 200ms
          update_interval: 200ms
          min_brightness: 30%
          max_brightness: 100%
