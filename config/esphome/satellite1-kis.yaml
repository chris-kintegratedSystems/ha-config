# KIS Satellite1 — FutureProofHomes ESP32-S3 Voice Satellite
# Wake word: "Hey TARS" → ARIA Bridge → Grok Realtime
#
# Architecture: satellite is dumb hardware (mic, speaker, wake word).
# All intelligence lives in the bridge at wss://192.168.51.179:8765/satellite
#
# After "Take Control" in ESPHome dashboard, flash this config via OTA.

esphome:
  name: satellite1-kis
  friendly_name: "TARS Satellite Office"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret satellite1_api_key

ota:
  - platform: esphome
    password: !secret satellite1_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: !secret satellite1_ip
    gateway: 192.168.51.1
    subnet: 255.255.255.0

# --- Audio Hardware (FutureProofHomes Satellite1 pinout) ---

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2
  - id: i2s_out
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO20

microphone:
  - platform: i2s_audio
    id: sat_mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    bits_per_sample: 16bit
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: sat_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO7
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 16000

# --- Wake Word Detection ---

micro_wake_word:
  models:
    - model: hey_tars.tflite
      probability_cutoff: 0.75
      sliding_window_average_size: 10
  microphone: sat_mic
  on_wake_word_detected:
    then:
      - logger.log: "Hey TARS detected — starting ARIA session"
      - lambda: |-
          auto *bridge = id(aria);
          bridge->start_session();

# --- ARIA Bridge Component ---

external_components:
  - source:
      type: local
      path: custom_components

aria_bridge:
  id: aria
  bridge_url: "wss://192.168.51.179:8765/satellite"
  microphone_id: sat_mic
  speaker_id: sat_speaker
  sample_rate: 16000

# --- Status LED ---

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO21
    num_leds: 1
    rmt_channel: 0
    chipset: SK6812
    rgb_order: GRB
