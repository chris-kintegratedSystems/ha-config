# KIS Satellite1 — FutureProofHomes ESP32-S3 Voice Satellite
# Wake word: "Hey Jarvis" → ARIA Bridge → Grok Realtime
#
# Architecture: satellite is dumb hardware (mic, speaker, wake word).
# All intelligence lives in the bridge at wss://192.168.51.179:8765/satellite
#
# Hardware: FPH Satellite1 v0.1.5 — XMOS XU316 is I2S master.
# ESP32-S3 runs in I2S secondary (slave) mode on a shared duplex bus.

esphome:
  name: satellite1-kis
  friendly_name: "TARS Satellite Office"
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret satellite1_api_key

ota:
  - platform: esphome
    password: !secret satellite1_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- Audio Hardware (FPH Satellite1 pinout — XMOS is I2S master) ---

i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
    i2s_mclk_pin: GPIO16

microphone:
  - platform: i2s_audio
    id: sat_mic
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    bits_per_sample: 16bit
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: sat_speaker
    i2s_audio_id: i2s_shared
    i2s_dout_pin: GPIO9
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 16000

# --- Wake Word Detection ---

micro_wake_word:
  models:
    - model: hey_jarvis
  on_wake_word_detected:
    then:
      - logger.log: "Wake word detected — starting ARIA session"
      - light.turn_on:
          id: led_ring
          effect: "Listening"
      - lambda: |-
          auto *bridge = id(aria);
          bridge->start_session();

# --- ARIA Bridge Component ---

external_components:
  - source:
      type: local
      path: custom_components

aria_bridge:
  id: aria
  bridge_url: "ws://192.168.51.179:8765/satellite"
  microphone_id: sat_mic
  speaker_id: sat_speaker
  sample_rate: 16000

# --- LED Ring (24x WS2812, GPIO21) ---

light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    pin: GPIO21
    num_leds: 24
    chipset: WS2812
    rgb_order: GRB
    effects:
      - addressable_rainbow:
          name: "Listening"
          speed: 30
          width: 24
