# KIS Satellite1 v6 — FPH hardware + ARIA Bridge + Speaker
# Wake word: "Hey Jarvis" → ARIA Bridge → Grok Realtime → TTS playback
#
# v5 → v6: Added TAS2780 speaker amp, I2S speaker output, resampler.
# Bridge audio (16kHz/16bit/mono) is resampled to 48kHz for I2S bus.
#
# Architecture: FPH packages handle XMOS co-processor, I2S bus, and audio
# hardware. aria_bridge replaces voice_assistant for Grok integration.
#
# Hardware: FPH Satellite1 v0.1.5 — XMOS XU316 is I2S master.
# ESP32-S3 runs in I2S secondary (slave) mode on a shared duplex bus.

substitutions:
  xmos_fw_version: v1.0.3

esphome:
  name: satellite1-kis
  friendly_name: "TARS Satellite Office"
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB
  on_boot:
    - priority: -100
      then:
        - logger.log: "KIS Satellite booting — waiting for XMOS + WiFi..."
        - delay: 5s
        - logger.log: "Starting wake word detection..."
        - micro_wake_word.start:
        - logger.log: "Listening for Hey Jarvis"
    # === TEMP AUTOTEST (v9) — REMOVE before Phase 1 done ===
    # Verifies connect_task_/send_task_ spawn + bridge connect without a wake word.
    - priority: -200
      then:
        - delay: 75s
        - lambda: |-
            ESP_LOGI("autotest", "Heap pre-session: %u (min %u)", esp_get_free_heap_size(), esp_get_minimum_free_heap_size());
        - logger.log: "AUTOTEST: triggering start_session()"
        - lambda: 'id(aria).start_session();'
        - delay: 6s
        - logger.log: "AUTOTEST: triggering stop_session()"
        - lambda: 'id(aria).stop_session();'
        - delay: 2s
        - lambda: |-
            ESP_LOGI("autotest", "Heap post-session: %u (min %u)", esp_get_free_heap_size(), esp_get_minimum_free_heap_size());
        - logger.log: "AUTOTEST: complete"

# === TEMP HEAP MONITOR (v9) — REMOVE before Phase 1 done ===
interval:
  - interval: 20s
    then:
      - lambda: |-
          ESP_LOGI("heapmon", "Free heap: %u (min %u)", esp_get_free_heap_size(), esp_get_minimum_free_heap_size());

# --- FPH Hardware Packages ---
# core_board: ESP32-S3 config, PSRAM, I2C, SPI, UART, I2S (duplex + secondary)
# components.external: FPH custom components (satellite1, i2s_audio, tas2780, etc.)
packages:
  hardware:
    url: &repo https://github.com/futureproofhomes/satellite1-esphome
    ref: &ref staging
    refresh: 1s
    files:
      - config/common/core_board.yaml
      - path: config/common/components.external.yaml
        vars:
          ext_comp_repo_url: https://github.com/futureproofhomes/satellite1-esphome
          ext_comp_repo_ref: staging

# --- KIS Custom Component ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [aria_bridge]

logger:
  level: DEBUG

api:

ota:
  - platform: esphome
    password: !secret satellite1_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none  # v9: disable WiFi power-save — fixes idle ping choke (426ms->target <50ms)

safe_mode:

# --- TAS2780 Power Tracking ---
globals:
  - id: pd_power_contract
    type: int
    restore_value: no
    initial_value: '0'

# --- XMOS Co-Processor Init (SPI handshake + reset) ---
satellite1:
  id: satellite1_id
  spi_id: spi_0
  cs_pin: GPIO10
  data_rate: 8000000
  spi_mode: MODE3
  xmos_rst_pin: GPIO4
  on_xmos_connected:
    - logger.log: "XMOS connected — I2S clocks active"
  on_xmos_no_response:
    - logger.log:
        level: ERROR
        format: "XMOS not responding — I2S clocks may be absent"

# --- USB-C Power Delivery + TAS2780 Activation ---
fusb302b:
  id: pd_fusb302b
  irq_pin: GPIO1
  request_voltage: 20
  on_power_ready:
    then:
      - lambda: id(pd_power_contract) = id(pd_fusb302b).contract_voltage;
      - logger.log:
          format: "PD contract accepted: %dV — activating TAS2780"
          args: ['id(pd_power_contract)']
      - tas2780.activate:
          mode: !lambda 'return id(pd_power_contract) >= 9 ? 2 : 0;'

# --- Microphone (FPH satellite1 platform) ---
# XMOS delivers 48kHz/32-bit/stereo; Sat1Microphone downsamples to 16kHz mono
microphone:
  - platform: satellite1
    id: sat1_mics
    sample_rate: 48000
    i2s_din_pin: GPIO15
    bits_per_sample: 32bit
    channel: stereo
    pdm: false
    adc_type: external
    i2s_audio_id: i2s_shared

# --- DAC Chain (TAS2780 speaker amp + proxy) ---
audio_dac:
  - platform: tas2780
    id: speaker_dac
    address: 0x3F
  - platform: satellite1
    id: dac_proxy
    speaker_dac: speaker_dac

# --- Speaker Output (I2S → resampler for bridge audio) ---
speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_dout_pin: GPIO9
    bits_per_sample: 32bit
    i2s_audio_id: i2s_shared
    dac_type: external
    channel: stereo
    timeout: never
    audio_dac: dac_proxy
  - platform: resampler
    id: sat1_speaker
    output_speaker: i2s_audio_speaker
    sample_rate: 48000
    bits_per_sample: 16

# --- Wake Word Detection ---
micro_wake_word:
  models:
    - model: hey_jarvis
  vad:
  microphone:
    microphone: sat1_mics
    channels: 1
    gain_factor: 6
  stop_after_detection: false
  on_wake_word_detected:
    - logger.log: "Wake word detected — starting ARIA session"
    - light.turn_on:
        id: led_ring
        effect: "Listening"
    - lambda: |-
        id(aria).start_session();

# --- ARIA Bridge (mic + speaker via resampler) ---
aria_bridge:
  id: aria
  bridge_url: "ws://192.168.51.179:8766/satellite"
  microphone_id: sat1_mics
  speaker_id: sat1_speaker
  sample_rate: 16000

# --- LED Ring (24x WS2812, GPIO21) ---
light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    pin: GPIO21
    num_leds: 24
    chipset: WS2812
    rgb_order: GRB
    effects:
      - addressable_rainbow:
          name: "Listening"
          speed: 30
          width: 24
